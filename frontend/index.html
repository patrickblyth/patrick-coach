<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Patrick AI Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F0F4F9;
      --card: #FFFFFF;
      --header-from: #0A1F3D;
      --header-to: #0F2F5C;
      --primary: #2563EB;
      --primary-hover: #1D4ED8;
      --accent: #3B82F6;
      --text: #111827;
      --muted: #6B7280;
      --border: #E5E9F0;
      --error-bg: #FEF2F2;
      --error-text: #B91C1C;
      --radius: 14px;
      --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: linear-gradient(160deg, var(--header-from) 0%, var(--header-to) 100%);
      color: white;
      padding-top: calc(28px + env(safe-area-inset-top, 0));
      padding-bottom: 28px;
      padding-left: 24px;
      padding-right: 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 60% 0%, rgba(59,130,246,0.18) 0%, transparent 65%);
      pointer-events: none;
    }

    .header-eyebrow {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 6px;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: white;
      line-height: 1.1;
    }

    header h1 span {
      color: #93C5FD;
    }

    .header-sub {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.45);
      margin-top: 6px;
      font-weight: 400;
    }

    /* Model toggle */
    .model-toggle {
      display: inline-flex;
      margin-top: 16px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 3px;
      gap: 2px;
    }
    .model-toggle button {
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 5px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .model-toggle button.active {
      background: rgba(255,255,255,0.15);
      color: white;
    }
    .model-toggle button:hover:not(.active) {
      color: rgba(255,255,255,0.75);
    }
    .model-toggle button#btn-sonnet.active {
      background: rgba(245, 158, 11, 0.35);
      color: #FDE68A;
    }

    /* Sonnet mode — amber action buttons */
    body.sonnet-mode .briefing-btn {
      background: linear-gradient(135deg, #D97706 0%, #B45309 100%);
      box-shadow: 0 4px 20px rgba(217, 119, 6, 0.4);
    }
    body.sonnet-mode .briefing-btn:hover {
      box-shadow: 0 6px 24px rgba(217, 119, 6, 0.5);
    }
    body.sonnet-mode .send-btn {
      background: #D97706;
    }
    body.sonnet-mode .send-btn:hover {
      background: #B45309;
    }

    /* Main content */
    main {
      flex: 1;
      padding: 24px 16px;
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Cards */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,0,0,0.04);
    }

    /* Primary action */
    .briefing-btn {
      width: 100%;
      padding: 17px 20px;
      background: linear-gradient(135deg, var(--primary) 0%, #1D4ED8 100%);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 0.97rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(37, 99, 235, 0.35);
      letter-spacing: -0.01em;
    }
    .briefing-btn:hover { opacity: 0.92; box-shadow: 0 6px 24px rgba(37,99,235,0.4); }
    .briefing-btn:active { transform: scale(0.985); }
    .briefing-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }
    .briefing-btn svg { flex-shrink: 0; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.03em;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Ask input */
    .input-row {
      display: flex;
      gap: 10px;
    }
    textarea {
      flex: 1;
      resize: none;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.93rem;
      font-family: inherit;
      color: var(--text);
      background: var(--card);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      min-height: 52px;
      max-height: 150px;
      line-height: 1.5;
    }
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    textarea::placeholder { color: #9CA3AF; }

    .send-btn {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      align-self: flex-end;
    }
    .send-btn:hover { background: var(--primary-hover); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Response area */
    #response-card { display: none; }
    #response-card.visible { display: block; }

    .response-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .response-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    #response-content {
      font-size: 0.93rem;
      line-height: 1.7;
      color: var(--text);
    }

    #response-content h2 {
      font-size: 0.95rem;
      font-weight: 700;
      margin: 18px 0 6px;
      color: var(--header-from);
      letter-spacing: -0.01em;
    }
    #response-content h2:first-child { margin-top: 0; }
    #response-content h3 {
      font-size: 0.88rem;
      font-weight: 600;
      margin: 14px 0 4px;
      color: #374151;
    }
    #response-content p { margin-bottom: 10px; }
    #response-content p:last-child { margin-bottom: 0; }
    #response-content ul { padding-left: 18px; margin-bottom: 10px; }
    #response-content li { margin-bottom: 5px; }
    #response-content strong { font-weight: 600; color: #111827; }
    #response-content em { color: var(--muted); font-style: italic; }
    #response-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }

    /* Loading state */
    .loading-dots {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 6px 0;
    }
    .loading-dots span {
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.55); opacity: 0.35; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Error */
    .error-box {
      background: var(--error-bg);
      color: var(--error-text);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.875rem;
      line-height: 1.5;
    }

    /* Footer */
    footer {
      text-align: center;
      font-size: 0.7rem;
      color: #9CA3AF;
      padding: 14px 16px calc(14px + env(safe-area-inset-bottom, 0));
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

<header>
  <div class="header-eyebrow">AI Coaching</div>
  <h1>Patrick <span>Coach</span></h1>
  <p class="header-sub">Live training data &middot; Melbourne</p>
  <div class="model-toggle">
    <button id="btn-haiku" class="active" onclick="setModel('haiku')">Haiku</button>
    <button id="btn-sonnet" onclick="setModel('sonnet')">Sonnet</button>
  </div>
</header>

<main>
  <button class="briefing-btn" id="briefing-btn" onclick="requestBriefing()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    Morning Briefing
  </button>

  <div class="divider">or ask a question</div>

  <div class="card" style="padding: 16px;">
    <div class="input-row">
      <textarea
        id="question-input"
        placeholder="e.g. How should I pace Sunday's long run?"
        rows="2"
        onkeydown="handleKey(event)"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="askQuestion()" title="Send">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="card" id="response-card">
    <div class="response-label">Coach Response</div>
    <div id="response-content"></div>
  </div>
</main>

<footer>Data refreshes nightly from Strava &amp; Garmin</footer>

<script>
  const WORKER_URL = 'https://patrick-ai-coach.patrick-coach.workers.dev';

  let selectedModel = 'claude-haiku-4-5-20251001';

  function setModel(name) {
    selectedModel = name === 'sonnet' ? 'claude-sonnet-4-6' : 'claude-haiku-4-5-20251001';
    document.getElementById('btn-haiku').classList.toggle('active', name === 'haiku');
    document.getElementById('btn-sonnet').classList.toggle('active', name === 'sonnet');
    document.body.classList.toggle('sonnet-mode', name === 'sonnet');
  }

  function setLoading(loading) {
    document.getElementById('briefing-btn').disabled = loading;
    document.getElementById('send-btn').disabled = loading;
  }

  function showLoading() {
    const card = document.getElementById('response-card');
    const content = document.getElementById('response-content');
    card.classList.add('visible');
    content.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  }

  function showResponse(text) {
    document.getElementById('response-content').innerHTML = renderMarkdown(text);
  }

  function showError(msg) {
    document.getElementById('response-content').innerHTML =
      `<div class="error-box">⚠️ ${escapeHtml(msg)}</div>`;
  }

  async function requestBriefing() {
    setLoading(true);
    showLoading();
    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: 'briefing', message: '', model: selectedModel }),
      });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || 'Request failed');
      showResponse(data.response);
    } catch (e) {
      showError(e.message);
    } finally {
      setLoading(false);
    }
  }

  async function askQuestion() {
    const input = document.getElementById('question-input');
    const message = input.value.trim();
    if (!message) return;

    setLoading(true);
    showLoading();
    input.value = '';
    input.style.height = '';

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: 'question', message, model: selectedModel }),
      });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || 'Request failed');
      showResponse(data.response);
    } catch (e) {
      showError(e.message);
    } finally {
      setLoading(false);
    }
  }

  function handleKey(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      askQuestion();
    }
    const ta = e.target;
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 150) + 'px';
  }

  function renderMarkdown(text) {
    let html = escapeHtml(text);
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    html = html.replace(/^---$/gm, '<hr>');
    html = html.replace(/((?:^[•\-\*] .+\n?)+)/gm, (block) => {
      const items = block.trim().split('\n').map(line =>
        `<li>${line.replace(/^[•\-\*] /, '')}</li>`
      ).join('');
      return `<ul>${items}</ul>`;
    });
    html = html.split(/\n{2,}/).map(para => {
      para = para.trim();
      if (!para) return '';
      if (/^<(h[1-6]|ul|hr|li)/.test(para)) return para;
      return `<p>${para.replace(/\n/g, '<br>')}</p>`;
    }).join('\n');
    return html;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
