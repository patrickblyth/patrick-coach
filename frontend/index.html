<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Patrick AI Coach</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #EEF2F7;
      --card: #FFFFFF;
      --header-bg: #0F2B4D;
      --primary: #1D6AE5;
      --primary-hover: #1558C7;
      --text: #1A2332;
      --muted: #6B7A8D;
      --border: #E2E8F0;
      --success: #16A349;
      --error-bg: #FEF2F2;
      --error-text: #B91C1C;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: var(--header-bg);
      color: white;
      padding: 20px 20px env(safe-area-inset-top, 0);
      padding-top: calc(16px + env(safe-area-inset-top, 0));
      text-align: center;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.04em; opacity: 0.95; }
    header p { font-size: 0.8rem; opacity: 0.6; margin-top: 2px; }

    /* Main content */
    main {
      flex: 1;
      padding: 20px 16px;
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Cards */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    /* Primary action */
    .briefing-btn {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.15s, transform 0.1s;
      box-shadow: 0 4px 14px rgba(29, 106, 229, 0.3);
    }
    .briefing-btn:hover { background: var(--primary-hover); }
    .briefing-btn:active { transform: scale(0.98); }
    .briefing-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .briefing-btn svg { flex-shrink: 0; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Ask input */
    .input-row {
      display: flex;
      gap: 10px;
    }
    textarea {
      flex: 1;
      resize: none;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      background: var(--card);
      outline: none;
      transition: border-color 0.15s;
      min-height: 52px;
      max-height: 150px;
    }
    textarea:focus { border-color: var(--primary); }
    textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      align-self: flex-end;
    }
    .send-btn:hover { background: var(--primary-hover); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Response area */
    #response-card { display: none; }
    #response-card.visible { display: block; }

    .response-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    #response-content {
      font-size: 0.95rem;
      line-height: 1.65;
      color: var(--text);
    }

    /* Markdown-like rendering */
    #response-content h2 {
      font-size: 1rem;
      font-weight: 700;
      margin: 16px 0 6px;
      color: var(--header-bg);
    }
    #response-content h2:first-child { margin-top: 0; }
    #response-content p { margin-bottom: 10px; }
    #response-content p:last-child { margin-bottom: 0; }
    #response-content ul { padding-left: 18px; margin-bottom: 10px; }
    #response-content li { margin-bottom: 4px; }
    #response-content strong { font-weight: 600; }
    #response-content em { color: var(--muted); font-style: italic; }
    #response-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 14px 0;
    }

    /* Loading state */
    .loading-dots {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 4px 0;
    }
    .loading-dots span {
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Error */
    .error-box {
      background: var(--error-bg);
      color: var(--error-text);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.88rem;
    }

    /* Footer */
    footer {
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0));
    }
  </style>
</head>
<body>

<header>
  <h1>Patrick AI Coach</h1>
  <p>Powered by live training data</p>
</header>

<main>
  <!-- Primary action -->
  <button class="briefing-btn" id="briefing-btn" onclick="requestBriefing()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    Morning Briefing
  </button>

  <!-- Divider -->
  <div class="divider">or ask a question</div>

  <!-- Ask input -->
  <div class="card" style="padding: 16px;">
    <div class="input-row">
      <textarea
        id="question-input"
        placeholder="e.g. How should I pace Sunday's long run?"
        rows="2"
        onkeydown="handleKey(event)"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="askQuestion()" title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Response area -->
  <div class="card" id="response-card">
    <div class="response-label">Coach Response</div>
    <div id="response-content"></div>
  </div>
</main>

<footer>Patrick AI Coach &mdash; Data refreshes live from Google Sheets</footer>

<script>
  // ⚠️ Replace this with your deployed Cloudflare Worker URL
  const WORKER_URL = 'https://patrick-ai-coach.YOUR-SUBDOMAIN.workers.dev';

  function setLoading(loading) {
    const briefingBtn = document.getElementById('briefing-btn');
    const sendBtn = document.getElementById('send-btn');
    briefingBtn.disabled = loading;
    sendBtn.disabled = loading;
  }

  function showLoading() {
    const card = document.getElementById('response-card');
    const content = document.getElementById('response-content');
    card.classList.add('visible');
    content.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  }

  function showResponse(text) {
    document.getElementById('response-content').innerHTML = renderMarkdown(text);
  }

  function showError(msg) {
    document.getElementById('response-content').innerHTML =
      `<div class="error-box">⚠️ ${escapeHtml(msg)}</div>`;
  }

  async function requestBriefing() {
    setLoading(true);
    showLoading();
    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: 'briefing', message: '' }),
      });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || 'Request failed');
      showResponse(data.response);
    } catch (e) {
      showError(e.message);
    } finally {
      setLoading(false);
    }
  }

  async function askQuestion() {
    const input = document.getElementById('question-input');
    const message = input.value.trim();
    if (!message) return;

    setLoading(true);
    showLoading();
    input.value = '';
    input.style.height = '';

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: 'question', message }),
      });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || 'Request failed');
      showResponse(data.response);
    } catch (e) {
      showError(e.message);
    } finally {
      setLoading(false);
    }
  }

  function handleKey(e) {
    // Ctrl/Cmd+Enter to send; auto-grow textarea
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      askQuestion();
    }
    // Auto-grow
    const ta = e.target;
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 150) + 'px';
  }

  // Minimal Markdown → HTML renderer
  function renderMarkdown(text) {
    let html = escapeHtml(text);

    // Headings
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');

    // Bold / italic
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

    // Horizontal rule
    html = html.replace(/^---$/gm, '<hr>');

    // Unordered lists (group consecutive lines)
    html = html.replace(/((?:^[•\-\*] .+\n?)+)/gm, (block) => {
      const items = block.trim().split('\n').map(line =>
        `<li>${line.replace(/^[•\-\*] /, '')}</li>`
      ).join('');
      return `<ul>${items}</ul>`;
    });

    // Paragraphs: double newline → paragraph break
    html = html.split(/\n{2,}/).map(para => {
      para = para.trim();
      if (!para) return '';
      if (/^<(h[1-6]|ul|hr|li)/.test(para)) return para;
      return `<p>${para.replace(/\n/g, '<br>')}</p>`;
    }).join('\n');

    return html;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
